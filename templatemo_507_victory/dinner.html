<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lunch Menu - Abdullah Food Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { 
            background: #fdfdfd; 
            font-family: 'Spectral', serif; 
            padding: 20px; 
        }
        .menu-wrapper { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .page-title { 
            text-align: center; 
            color: #f33c3c; 
            font-weight: bold; 
            margin-bottom: 40px; 
            border-bottom: 3px solid #f33c3c; 
            display: inline-block; 
            width: 100%; 
            padding-bottom: 10px;
        }
        /* Tameez wala List Layout */
        .food-item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid #eee;
        }
        .food-item img { 
            width: 120px; 
            height: 120px; 
            object-fit: cover; 
            border-radius: 12px; 
            margin-right: 25px;
            border: 3px solid #f33c3c;
        }
        .food-text { flex: 1; }
        .food-text h4 { margin: 0; color: #222; font-weight: bold; font-size: 20px; }
        .food-text p { margin: 5px 0; color: #777; font-size: 15px; }
        .item-price { color: #f33c3c; font-weight: bold; font-size: 18px; }
        .btn-home { 
            background: #f33c3c; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 5px; 
            text-decoration: none; 
            display: inline-block; 
            margin-bottom: 20px; 
        }
        .btn-home:hover { background: #d63030; color: white; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-home">← Back to Home</a>
    
    <div class="menu-wrapper">
        <h2 class="page-title">Dinner Menu</h2>

<div class="food-item">
    <img src="img/beef ribs.jpg" alt="Beef Ribs">
    <div class="food-text">
        <h4>Beef Ribs</h4>
    </div>
    <div class="item-price">Rs. 3500</div>
</div>

<div class="food-item">
    <img src="img/beef steak.jfif" alt="Beef Steak">
    <div class="food-text">
        <h4>Prime Beef Steak</h4>
    </div>
    <div class="item-price">Rs. 3200</div>
</div>

<div class="food-item">
    <img src="img/Lamb Shank.jpg" alt="Lamb Shank">
    <div class="food-text">
        <h4>Shahi Lamb Shank</h4>
    </div>
    <div class="item-price">Rs. 2800</div>
</div>

<div class="food-item">
    <img src="img/Beef Wellington.jfif" alt="Beef Wellington">
    <div class="food-text">
        <h4>Beef Wellington</h4>
    </div>
    <div class="item-price">Rs. 4500</div>
</div>

<div class="food-item">
    <img src="img/chicken reshmi kabab.jpg" alt="Chicken Reshmi Kabab">
    <div class="food-text">
        <h4>Chicken Reshmi Kabab</h4>
    </div>
    <div class="item-price">Rs. 1200</div>
</div>

<div class="food-item">
    <img src="img/chicken chargha.jfif" alt="Chicken Chargha">
    <div class="food-text">
        <h4>Lahori Chicken Chargha</h4>
    </div>
    <div class="item-price">Rs. 1800</div>
</div>

<div class="food-item">
    <img src="img/afghani-tikka.jpg" alt="Afghani Tikka">
    <div class="food-text">
        <h4>Afghani Tikka</h4>
    </div>
    <div class="item-price">Rs. 1400</div>
</div>

<div class="food-item">
    <img src="img/Dum Pukht.jfif" alt="Dum Pukht">
    <div class="food-text">
        <h4>Mutton Dum Pukht</h4>
    </div>
    <div class="item-price">Rs. 3800</div>
</div>

<div class="food-item">
    <img src="img/Grilled Fish.jpg" alt="Grilled Fish">
    <div class="food-text">
        <h4>Grilled Fish</h4>
    </div>
    <div class="item-price">Rs. 2200</div>
</div>
